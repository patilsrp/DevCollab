global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'devcollab-server'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['server:3001']
        labels:
          service: 'devcollab'
          env: 'production'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']